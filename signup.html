<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loopabl — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    try {
      if (Object.keys(localStorage).some(k => k.startsWith('sb-') && k.endsWith('-auth-token')))
        window.location.replace('/app');
    } catch(e) {}
  </script>
</head>
<body class="login-page">

  <div class="login-split">

    <div class="login-left">
      <a href="/" class="logo logo--white">
        <svg class="logo-mark" viewBox="0 0 48 24" fill="none" aria-hidden="true">
          <path d="M24,12 C24,6 20,2 14,2 C8,2 4,6 4,12 C4,18 8,22 14,22 C20,22 24,18 24,12 C24,6 28,2 34,2 C40,2 44,6 44,12 C44,18 40,22 34,22 C28,22 24,18 24,12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Loopabl
      </a>
      <div class="login-brand-content">
        <svg class="login-brand-mark" viewBox="0 0 48 24" fill="none" aria-hidden="true">
          <path d="M24,12 C24,6 20,2 14,2 C8,2 4,6 4,12 C4,18 8,22 14,22 C20,22 24,18 24,12 C24,6 28,2 34,2 C40,2 44,6 44,12 C44,18 40,22 34,22 C28,22 24,18 24,12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2 class="login-brand-headline">Build habits<br><em>that loop.</em></h2>
        <p class="login-brand-sub">A focused system for small habits that compound into big change.</p>
      </div>
    </div>

    <div class="login-right">
      <div class="auth-card">

        <h2 class="auth-heading">Create account</h2>

        <p id="auth-status" class="auth-status hidden"></p>
        <p id="auth-error"  class="auth-error hidden"></p>

        <form id="auth-form" class="auth-form">
          <input id="auth-email"    type="email"    placeholder="Email"    autocomplete="email"            required />
          <input id="auth-password" type="password" placeholder="Password" autocomplete="new-password"     required />
          <input id="auth-username" type="text"     placeholder="Username (3–30 characters)" autocomplete="username" required />
          <button id="auth-submit-btn" class="btn-primary auth-submit" type="submit">Sign Up</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <button class="auth-google-btn" type="button" id="google-btn">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>

      </div>
    </div>

  </div>

  <script type="module" src="js/signup.js"></script>
</body>
</html>
