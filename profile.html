<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile — Loopabl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <a href="/" class="logo">
      <svg class="logo-mark" viewBox="0 0 48 24" fill="none" aria-hidden="true">
        <path d="M24,12 C24,6 20,2 14,2 C8,2 4,6 4,12 C4,18 8,22 14,22 C20,22 24,18 24,12 C24,6 28,2 34,2 C40,2 44,6 44,12 C44,18 40,22 34,22 C28,22 24,18 24,12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Loopabl
    </a>
    <a href="/app" class="back-btn">← Back</a>
  </header>

  <main class="main">
    <div class="profile-page">
      <h2 class="profile-page-title">Edit Profile</h2>

      <form id="profile-form" class="profile-form">
        <div class="form-field">
          <label for="profile-username">Username</label>
          <input id="profile-username" type="text" placeholder="Username" autocomplete="username" maxlength="30" />
          <span class="form-hint">3–30 characters. Must be unique.</span>
        </div>

        <div class="form-field">
          <label for="profile-email">Email</label>
          <input id="profile-email" type="email" disabled />
        </div>

        <p id="profile-msg" class="profile-msg hidden"></p>

        <button id="profile-save-btn" class="btn-primary" type="submit">Save Changes</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
