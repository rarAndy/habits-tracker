<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile — Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <a href="index.html" class="logo">
      Habit Tracker
      <span>atomic habits system</span>
    </a>
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <main class="main">
    <div class="profile-page">
      <h2 class="profile-page-title">Edit Profile</h2>

      <form id="profile-form" class="profile-form">
        <div class="form-field">
          <label for="profile-username">Username</label>
          <input id="profile-username" type="text" placeholder="Username" autocomplete="username" maxlength="30" />
          <span class="form-hint">3–30 characters. Must be unique.</span>
        </div>

        <div class="form-field">
          <label for="profile-email">Email</label>
          <input id="profile-email" type="email" disabled />
        </div>

        <p id="profile-msg" class="profile-msg hidden"></p>

        <button id="profile-save-btn" class="btn-primary" type="submit">Save Changes</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
