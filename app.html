<!DOCTYPE html>
<html lang="en" class="app-shell">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loopabl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    try {
      if (!Object.keys(localStorage).some(k => k.startsWith('sb-') && k.endsWith('-auth-token')))
        window.location.replace('/login');
    } catch(e) {}
  </script>
</head>
<body class="lab">
  <script>try { const t=localStorage.getItem('loopabl-theme'); if(t==='light')document.body.classList.add('light'); else if(t==='catppuccin')document.body.classList.add('catppuccin'); if(localStorage.getItem('loopabl-sidebar')==='closed')document.body.classList.add('sidebar-closed'); } catch(e) {}</script>

  <div class="ss-root">
    <!-- Sidebar -->
    <aside class="sb" id="sidebar"></aside>

    <!-- Main stage -->
    <div class="sb-stage">
      <div class="sb-topbar" id="topbar"></div>
      <main class="sb-content" id="app"></main>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
