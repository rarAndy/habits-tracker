<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Auth Overlay ─────────────────────────────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-brand">
        <h1 class="auth-brand-name">Habit Tracker</h1>
        <p class="auth-brand-sub">atomic habits system</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin" type="button" onclick="authSetTab('signin')">Sign In</button>
        <button class="auth-tab"        data-tab="signup" type="button" onclick="authSetTab('signup')">Sign Up</button>
      </div>

      <p id="auth-status" class="auth-status hidden"></p>
      <p id="auth-error"  class="auth-error hidden"></p>

      <form id="auth-form" class="auth-form">
        <input id="auth-email"    type="email"    placeholder="Email"    autocomplete="email"            required />
        <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" required />
        <button id="auth-submit-btn" class="btn-primary auth-submit" type="submit">Sign In</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <button class="auth-google-btn" type="button" onclick="authGoogle()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>

  <!-- ── App Shell (hidden until signed in) ───────────────────────────────── -->
  <div id="app-shell" class="hidden">

    <header class="page-header">
      <div class="logo">
        Habit Tracker
        <span>atomic habits system</span>
      </div>
      <span id="user-email" class="user-email"></span>
      <button class="sign-out-btn" type="button" onclick="handleSignOut()">Sign out</button>
    </header>

    <nav class="toolbar" aria-label="Main controls">
      <div class="toolbar-inner">
        <div class="toolbar-section">
          <span class="toolbar-label">Mode</span>
          <div class="toolbar-group">
            <button id="mode-edit-btn" class="mode-btn" type="button" onclick="setAppMode('edit')">Edit</button>
            <button id="mode-view-btn" class="mode-btn" type="button" onclick="setAppMode('view')">View</button>
          </div>
        </div>

        <div class="toolbar-sep"></div>

        <div class="toolbar-section">
          <span class="toolbar-label">Sort by</span>
          <div class="toolbar-group">
            <button class="toolbar-btn" type="button" onclick="sortAllByPriority()">Priority</button>
            <button class="toolbar-btn" type="button" onclick="sortAllByType('positive')">Positive</button>
            <button class="toolbar-btn" type="button" onclick="sortAllByType('negative')">Negative</button>
          </div>
        </div>

        <div class="toolbar-sep"></div>

        <div class="toolbar-section">
          <span class="toolbar-label">Template</span>
          <div class="toolbar-group">
            <button class="toolbar-btn toolbar-btn-danger" type="button" onclick="applyTemplate()">Load Example</button>
          </div>
        </div>

        <div class="toolbar-sep"></div>

        <div class="toolbar-section">
          <span class="toolbar-label">Data</span>
          <div class="toolbar-group">
            <div class="toolbar-dropdown">
              <button class="toolbar-btn toolbar-btn-caret" type="button" onclick="toggleExportMenu(event)">
                Export <span class="btn-caret">&#9660;</span>
              </button>
              <div class="toolbar-dropdown-menu" id="export-menu">
                <button type="button" onclick="exportJSON(); closeExportMenu()">JSON</button>
                <button type="button" onclick="exportCSV(); closeExportMenu()">CSV</button>
              </div>
            </div>
            <button class="toolbar-btn" type="button" onclick="triggerImport()">Import</button>
          </div>
          <input type="file" id="import-input" accept=".json,.csv" style="display:none" onchange="handleImport(event)" />
        </div>
      </div>
    </nav>

    <main class="main">
      <div class="add-bar">
        <input
          id="new-cat"
          type="text"
          placeholder="New category name (e.g. Productivity, Morning routine...)"
        />
        <button id="add-cat-btn" class="btn-primary" type="button">+ Add Category</button>
      </div>

      <div id="app"></div>
    </main>

  </div><!-- /#app-shell -->

  <script type="module" src="js/app.js"></script>
</body>
</html>
